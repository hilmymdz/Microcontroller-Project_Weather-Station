<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard UAS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div class="dashboard">
        <div class="main-content">
            <div class="search-bar">Monitoring Stasiun Cuaca ESP32</div>

            <div class="hero-card">
                <div>
                    <div class="city-name">Stasiun Mini</div>
                    <div class="chance-rain">Real-time Data Node</div>
                    <div class="main-temp"><span id="suhu">--</span>&deg;</div>
                </div>
                <div class="sun-icon"><i class="fas fa-sun"></i></div>
            </div>

            <div class="air-conditions">
                <div class="section-title">Kondisi Lingkungan Ruangan</div>
                <div class="grid-conditions">
                    
                    <div class="condition-item">
                        <i class="fas fa-tint condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Kelembapan</span>
                            <span class="value" id="kelembapan">-- %</span>
                        </div>
                    </div>

                    <div class="condition-item">
                        <i class="fas fa-tachometer-alt condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Tekanan Udara</span>
                            <span class="value"><span id="tekanan">--</span> hPa</span>
                        </div>
                    </div>

                    <div class="condition-item">
                        <i class="fas fa-lightbulb condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Intensitas Cahaya</span>
                            <span class="value"><span id="cahaya">--</span> lx</span>
                        </div>
                    </div>

                    <div class="condition-item">
                        <i class="fas fa-fan condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Status Kipas Aktuator</span>
                            <span class="value" id="kipas">--</span>
                            
                            <div class="control-group">
                                <button class="control-btn btn-active" id="btn-auto" onclick="kirimPerintah('AUTO')">Auto</button>
                                <button class="control-btn" id="btn-on" onclick="kirimPerintah('ON')">On</button>
                                <button class="control-btn" id="btn-off" onclick="kirimPerintah('OFF')">Off</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="section-title">Log Sistem (Mockup)</div>
            <ul class="forecast-list">
                <li><span>ESP32 Node</span> <i class="fas fa-wifi" style="color:#00A3FF"></i> <span>Online</span></li>
                <li><span>DHT22</span> <i class="fas fa-check-circle" style="color:green"></i> <span>OK</span></li>
                <li><span>BMP280</span> <i class="fas fa-check-circle" style="color:green"></i> <span>OK</span></li>
                <li><span>GY-30</span> <i class="fas fa-check-circle" style="color:green"></i> <span>OK</span></li>
                <li><span>Relay Module</span> <i class="fas fa-bolt" style="color:orange"></i> <span>Standby</span></li>
            </ul>
        </div>
    </div>

    <script>
        const mqttKey = "uas-cuaca";      
        const mqttSecret = "6c0283NBx54lgA0b";   
        const clientId = "WebClientUI_" + Math.random().toString(16).substr(2, 8);
        const host = `wss://${mqttKey}:${mqttSecret}@uas-cuaca.cloud.shiftr.io`;
        
        const client = mqtt.connect(host, { clientId: clientId });

        client.on('connect', function () {
            console.log("Terhubung ke shiftr.io!");
            client.subscribe('uas/cuaca/#');
        });

        // Fungsi untuk mengirim perintah dari tombol ke ESP32
        function kirimPerintah(mode) {
            console.log("Mengirim perintah kipas: " + mode);
            client.publish('uas/cuaca/kendali_kipas', mode);

            // Ubah gaya visual tombol (warna biru penanda aktif)
            document.getElementById('btn-auto').classList.remove('btn-active');
            document.getElementById('btn-on').classList.remove('btn-active');
            document.getElementById('btn-off').classList.remove('btn-active');
            
            if (mode === 'AUTO') document.getElementById('btn-auto').classList.add('btn-active');
            if (mode === 'ON') document.getElementById('btn-on').classList.add('btn-active');
            if (mode === 'OFF') document.getElementById('btn-off').classList.add('btn-active');
        }

        client.on('message', function (topic, message) {
            const payload = message.toString();

            if (topic === 'uas/cuaca/suhu') {
                document.getElementById('suhu').innerText = parseFloat(payload).toFixed(1);
            } 
            else if (topic === 'uas/cuaca/kelembapan') {
                document.getElementById('kelembapan').innerText = parseFloat(payload).toFixed(1) + " %";
            } 
            else if (topic === 'uas/cuaca/tekanan') {
                document.getElementById('tekanan').innerText = payload;
            } 
            else if (topic === 'uas/cuaca/cahaya') {
                document.getElementById('cahaya').innerText = payload;
            } 
            else if (topic === 'uas/cuaca/kipas') {
                const kipasEl = document.getElementById('kipas');
                kipasEl.innerText = payload;
                
                if(payload.includes("ON")) {
                    kipasEl.className = "value fan-on";
                } else {
                    kipasEl.className = "value fan-off";
                }
            }
        });
    </script>
</body>
</html>
