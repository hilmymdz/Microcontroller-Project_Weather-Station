<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard UAS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        :root {
            --bg-main: #0B131E;
            --bg-panel: #202B3B;
            --text-main: #FFFFFF;
            --text-muted: #A0A5B1;
            --accent-blue: #00A3FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #161a23; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Container Utama Dashboard */
        .dashboard {
            background-color: var(--bg-main);
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            border-radius: 30px;
            display: flex;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            gap: 20px;
        }

        /* --- KONTEN TENGAH --- */
        .main-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header Pencarian / Judul */
        .search-bar {
            background-color: var(--bg-panel);
            padding: 15px 20px;
            border-radius: 15px;
            color: var(--text-main);
            font-size: 14px;
        }

        /* Card Cuaca Utama (Hero) */
        .hero-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }
        .city-name { font-size: 32px; font-weight: 700; }
        .chance-rain { font-size: 14px; color: var(--text-muted); }
        .main-temp { font-size: 80px; font-weight: 700; margin-top: 10px; }
        .sun-icon { font-size: 100px; color: #FDB813; text-shadow: 0 0 30px rgba(253, 184, 19, 0.4); }

        /* Card Kondisi Lingkungan (Grid 2x2) */
        .air-conditions {
            background-color: var(--bg-panel);
            border-radius: 20px;
            padding: 30px;
            flex: 1;
        }
        .section-title {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .grid-conditions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .condition-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .condition-icon {
            font-size: 24px;
            color: var(--text-muted);
        }
        .condition-info .label {
            font-size: 14px;
            color: var(--text-muted);
            display: block;
        }
        .condition-info .value {
            font-size: 24px;
            font-weight: 600;
        }
        
        /* Pewarnaan khusus status kipas */
        .fan-on { color: #00E676 !important; }
        .fan-off { color: #FF1744 !important; }

        /* --- SIDEBAR KANAN (ESTETIKA) --- */
        .right-sidebar {
            flex: 1;
            background-color: var(--bg-panel);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        .forecast-list {
            list-style: none;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .forecast-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <div class="main-content">
            <div class="search-bar">
                Monitoring Stasiun Cuaca ESP32
            </div>

            <div class="hero-card">
                <div>
                    <div class="city-name">Stasiun Mini</div>
                    <div class="chance-rain">Real-time Data Node</div>
                    <div class="main-temp"><span id="suhu">--</span>&deg;</div>
                </div>
                <div class="sun-icon">
                    <i class="fas fa-sun"></i>
                </div>
            </div>

            <div class="air-conditions">
                <div class="section-title">Kondisi Lingkungan Ruangan</div>
                <div class="grid-conditions">
                    
                    <div class="condition-item">
                        <i class="fas fa-tint condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Kelembapan</span>
                            <span class="value" id="kelembapan">-- %</span>
                        </div>
                    </div>

                    <div class="condition-item">
                        <i class="fas fa-tachometer-alt condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Tekanan Udara</span>
                            <span class="value"><span id="tekanan">--</span> hPa</span>
                        </div>
                    </div>

                    <div class="condition-item">
                        <i class="fas fa-lightbulb condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Intensitas Cahaya</span>
                            <span class="value"><span id="cahaya">--</span> lx</span>
                        </div>
                    </div>

                    <div class="condition-item">
                        <i class="fas fa-fan condition-icon"></i>
                        <div class="condition-info">
                            <span class="label">Status Kipas Aktuator</span>
                            <span class="value" id="kipas">--</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="section-title">Log Sistem (Mockup)</div>
            <ul class="forecast-list">
                <li><span>ESP32 Node</span> <i class="fas fa-wifi" style="color:#00A3FF"></i> <span>Online</span></li>
                <li><span>DHT22</span> <i class="fas fa-check-circle" style="color:green"></i> <span>OK</span></li>
                <li><span>BMP280</span> <i class="fas fa-check-circle" style="color:green"></i> <span>OK</span></li>
                <li><span>GY-30</span> <i class="fas fa-check-circle" style="color:green"></i> <span>OK</span></li>
                <li><span>Relay Module</span> <i class="fas fa-bolt" style="color:orange"></i> <span>Standby</span></li>
            </ul>
        </div>

    </div>

    <script>
        const mqttKey = "uas-cuaca";      
        const mqttSecret = "6c0283NBx54lgA0b";   
        const clientId = "WebClientUI_" + Math.random().toString(16).substr(2, 8);
        
        const host = `wss://${mqttKey}:${mqttSecret}@uas-cuaca.cloud.shiftr.io`;
        
        const client = mqtt.connect(host, { clientId: clientId });

        client.on('connect', function () {
            console.log("Terhubung ke shiftr.io!");
            client.subscribe('uas/cuaca/#');
        });

        client.on('message', function (topic, message) {
            const payload = message.toString();

            if (topic === 'uas/cuaca/suhu') {
                const suhuBulat = parseFloat(payload).toFixed(1);
                document.getElementById('suhu').innerText = suhuBulat;
            } 
            else if (topic === 'uas/cuaca/kelembapan') {
                document.getElementById('kelembapan').innerText = parseFloat(payload).toFixed(1) + " %";
            } 
            else if (topic === 'uas/cuaca/tekanan') {
                document.getElementById('tekanan').innerText = payload;
            } 
            else if (topic === 'uas/cuaca/cahaya') {
                document.getElementById('cahaya').innerText = payload;
            } 
            else if (topic === 'uas/cuaca/kipas') {
                const kipasEl = document.getElementById('kipas');
                kipasEl.innerText = payload;
                
                if(payload === "ON") {
                    kipasEl.className = "value fan-on";
                } else {
                    kipasEl.className = "value fan-off";
                }
            }
        });
    </script>
</body>
</html>
